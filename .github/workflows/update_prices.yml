name: Actualizar precios fondos

on:
  schedule:
    # Ejecutar cada día a las 18:00 UTC (ejemplo)
    - cron: '0 18 * * *'
  workflow_dispatch:   # permite lanzarlo manualmente

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # forzar Node 24 ya

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v5      # ← actualizado

      - name: Configurar Python
        uses: actions/setup-python@v6  # ← actualizado
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Ejecutar orquestador
        env:
          FUNDS_CSV_URL: ${{ secrets.FUNDS_CSV_URL }}
          FULLREFRESH: "0"
          LOOKBACK_DAYS: "14"
          # Si usas FlareProx, añade también FLAREPROX_URL
        run: python -m src.app

      - name: Commit y push de cambios (opcional)
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/ data/funds_metadata.json
          git diff --staged --quiet || (git commit -m "Actualización automática de precios" && git push)
