name: Actualizar precios de fondos

on:
  schedule:
    - cron: '0 6 * * 1-5'   # Lunes a viernes a las 06:00 UTC
  workflow_dispatch:          # Permite ejecución manual

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write          # Permiso para hacer push

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Elimina avisos de Node.js 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar que el secreto FUNDS_CSV_URL existe
        env:
          FUNDS_CSV_URL: ${{ secrets.FUNDS_CSV_URL }}
        run: |
          if [ -z "$FUNDS_CSV_URL" ]; then
            echo "ERROR: El secreto FUNDS_CSV_URL está vacío o no existe."
            exit 1
          fi
          echo "Secreto FUNDS_CSV_URL verificado correctamente."

      - name: Ejecutar actualizador
        env:
          FUNDS_CSV_URL: ${{ secrets.FUNDS_CSV_URL }}
        run: python src/app.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios que subir."
          else
            git commit -m "Actualización automática de precios"
            git push
          fi
