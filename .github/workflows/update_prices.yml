name: Actualizador Precios

on:
  schedule:
    - cron: "0 18 * * *"   # 1 vez al día, 18:00 UTC (20:00 CET verano / 19:00 invierno)
  workflow_dispatch:
    inputs:
      fullrefresh:
        description: "Backfill completo desde inception (1=sí, 0=no)"
        required: false
        default: "0"

concurrency:
  group: fund-prices
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar actualización
        env:
          FUNDS_CSV_URL: ${{ secrets.FUNDS_CSV_URL }}
          FLAREPROX_URL: ${{ secrets.FLAREPROX_URL }}   # <--- AÑADE ESTA LÍNEA
        run: python -m src.app

      - name: Commit y push si hay cambios
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices/ data/funds_metadata.json
          if git diff --cached --quiet; then
            echo "Sin cambios que subir"
          else
            git commit -m "chore: actualizar precios de fondos"
            git push
          fi
