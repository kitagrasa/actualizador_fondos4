name: Actualizar precios de fondos

on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Ejecutar actualizador
        env:
          FUNDS_CSV_URL: ${{ secrets.FUNDS_CSV_URL }}
        run: python -m src.app
      - name: Eliminar archivos temporales de Python
        run: |
          find . -name "__pycache__" -type d -exec rm -rf {} + 2>/dev/null || true
          find . -name "*.pyc" -exec rm -f {} \;
      - name: Commit cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Sin cambios."
          else
            git commit -m "Actualización automática de precios"
            git push
          fi
